<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会话列表</title>
    <style id="theme-vars">
/* ========================================
   IM System — Brand Design Tokens
   Style: Minimalist White (极简白)
   Device: Mobile (HarmonyOS App Mockup)
   ======================================== */

:root {
  /* ---- Brand Colors ---- */
  --color-primary: #1A1A2E;
  --color-primary-light: #2D2D44;
  --color-primary-dark: #0F0F1A;

  --color-accent: #E8753A;
  --color-accent-light: #F09060;
  --color-accent-dark: #C45E28;

  /* ---- Neutral Scale ---- */
  --color-bg: #FFFFFF;
  --color-bg-secondary: #F5F5F7;
  --color-bg-tertiary: #EDEDF0;
  --color-surface: #FFFFFF;
  --color-surface-hover: #F9F9FB;

  --color-text-primary: #1A1A2E;
  --color-text-secondary: #6B6B80;
  --color-text-tertiary: #9E9EB0;
  --color-text-inverse: #FFFFFF;

  --color-border: #E5E5EA;
  --color-border-light: #F0F0F2;
  --color-divider: #EAEAEF;

  /* ---- State Colors ---- */
  --state-success: #34C759;
  --state-warning: #FF9F0A;
  --state-error: #FF3B30;
  --state-info: #007AFF;

  /* ---- Chat Specific ---- */
  --color-bubble-self: #E8753A;
  --color-bubble-self-text: #FFFFFF;
  --color-bubble-other: #F0F0F2;
  --color-bubble-other-text: #1A1A2E;
  --color-bubble-system: #F5F5F7;
  --color-bubble-system-text: #6B6B80;

  /* ---- Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: "PingFang SC", "HarmonyOS Sans", -apple-system, "Helvetica Neue", "Noto Sans SC", sans-serif;
  --font-family-mono: "SF Mono", "Menlo", "Monaco", monospace;

  --font-size-xs: 10px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 28px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.65;

  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.05em;

  /* ---- Spacing ---- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;
  --space-4xl: 48px;

  /* ---- Shadows ---- */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ---- Transitions ---- */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* ---- Z-index ---- */
  --z-base: 0;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;
}

/* ---- Typography Classes ---- */
.text-xs { font-size: var(--font-size-xs); line-height: var(--line-height-tight); }
.text-sm { font-size: var(--font-size-sm); line-height: var(--line-height-normal); }
.text-base { font-size: var(--font-size-base); line-height: var(--line-height-normal); }
.text-md { font-size: var(--font-size-md); line-height: var(--line-height-normal); }
.text-lg { font-size: var(--font-size-lg); line-height: var(--line-height-tight); }
.text-xl { font-size: var(--font-size-xl); line-height: var(--line-height-tight); }
.text-2xl { font-size: var(--font-size-2xl); line-height: var(--line-height-tight); }
.text-3xl { font-size: var(--font-size-3xl); line-height: var(--line-height-tight); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-semibold { font-weight: var(--font-weight-semibold); }
.font-bold { font-weight: var(--font-weight-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-tertiary { color: var(--color-text-tertiary); }
.text-accent { color: var(--color-accent); }
.text-inverse { color: var(--color-text-inverse); }

/* ---- Utility Classes ---- */
.bg-page { background-color: var(--color-bg); }
.bg-secondary { background-color: var(--color-bg-secondary); }
.bg-surface { background-color: var(--color-surface); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background-color: var(--color-bg-secondary); font-family: var(--font-family);">

      <!-- Top Header Bar -->
      <header class="sticky top-0 z-[var(--z-sticky)] flex items-center justify-between px-[var(--space-lg)] h-11" style="background-color: var(--color-bg); border-bottom: 1px solid var(--color-border-light);">
        <h1 class="text-lg font-semibold tracking-[var(--letter-spacing-tight)]" style="color: var(--color-text-primary);">消息</h1>
        <button class="inline-flex items-center justify-center w-8 h-8 rounded-[var(--radius-md)]" style="color: var(--color-text-primary);" aria-label="新建会话">
          <i data-lucide="square-pen" class="w-5 h-5"></i>
        </button>
      </header>

      <!-- Session List -->
      <div class="pb-20">

        <!-- Session 1: Single chat with unread badge -->
        <div class="flex items-center gap-[var(--space-md)] px-[var(--space-lg)] py-[var(--space-md)] relative" style="background-color: var(--color-bg); border-bottom: 1px solid var(--color-divider);" data-dom-id="session-item-single">
          <!-- Avatar -->
          <div class="relative shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-sm font-semibold" style="background-color: #D4E4FF; color: #3B6FD4;">
            张
            <!-- Unread badge -->
            <span class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] rounded-full flex items-center justify-center text-[10px] font-medium px-1" style="background-color: var(--color-accent); color: var(--color-text-inverse); animation: badge-pulse 2s ease-in-out infinite;">3</span>
          </div>
          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[var(--font-size-base)] font-medium truncate" style="color: var(--color-text-primary);">张三的手机</span>
              <span class="text-[var(--font-size-xs)] shrink-0 ml-[var(--space-sm)]" style="color: var(--color-text-tertiary);">14:32</span>
            </div>
            <p class="text-[var(--font-size-sm)] truncate" style="color: var(--color-text-secondary);">好的，明天见！</p>
          </div>
        </div>

        <!-- Session 2: Group chat with unread badge -->
        <div class="flex items-center gap-[var(--space-md)] px-[var(--space-lg)] py-[var(--space-md)] relative" style="background-color: var(--color-bg); border-bottom: 1px solid var(--color-divider);" data-dom-id="session-item-group">
          <!-- Avatar -->
          <div class="relative shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-sm font-semibold" style="background-color: #E0D4F5; color: #7B5BB5;">
            P2P
            <!-- Unread badge -->
            <span class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] rounded-full flex items-center justify-center text-[10px] font-medium px-1" style="background-color: var(--color-accent); color: var(--color-text-inverse); animation: badge-pulse 2s ease-in-out infinite;">12</span>
          </div>
          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[var(--font-size-base)] font-medium truncate" style="color: var(--color-text-primary);">P2P群组 (3人)</span>
              <span class="text-[var(--font-size-xs)] shrink-0 ml-[var(--space-sm)]" style="color: var(--color-text-tertiary);">12:08</span>
            </div>
            <p class="text-[var(--font-size-sm)] truncate" style="color: var(--color-text-secondary);">李四: 文件已发送，请查收</p>
          </div>
        </div>

        <!-- Session 3: Single chat, no unread -->
        <div class="flex items-center gap-[var(--space-md)] px-[var(--space-lg)] py-[var(--space-md)] relative" style="background-color: var(--color-bg); border-bottom: 1px solid var(--color-divider);">
          <!-- Avatar -->
          <div class="shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-sm font-semibold" style="background-color: #D4F0E0; color: #3BA55D;">
            王
          </div>
          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[var(--font-size-base)] font-medium truncate" style="color: var(--color-text-primary);">王五</span>
              <span class="text-[var(--font-size-xs)] shrink-0 ml-[var(--space-sm)]" style="color: var(--color-text-tertiary);">昨天</span>
            </div>
            <p class="text-[var(--font-size-sm)] truncate" style="color: var(--color-text-secondary);">周末有空一起吃饭吗？</p>
          </div>
        </div>

        <!-- Session 4: Single chat with swipe hint -->
        <div class="flex items-center gap-[var(--space-md)] px-[var(--space-lg)] py-[var(--space-md)] relative overflow-hidden" style="background-color: var(--color-bg); border-bottom: 1px solid var(--color-divider);">
          <!-- Swipe hint -->
          <span class="absolute right-0 top-1/2 -translate-y-1/2 text-[var(--font-size-xs)] pr-[var(--space-md)]" style="color: var(--color-text-tertiary);">左滑删除</span>
          <!-- Avatar -->
          <div class="shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-sm font-semibold" style="background-color: #FFE8D4; color: #C47030;">
            赵
          </div>
          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[var(--font-size-base)] font-medium truncate" style="color: var(--color-text-primary);">赵六</span>
              <span class="text-[var(--font-size-xs)] shrink-0 ml-[var(--space-sm)]" style="color: var(--color-text-tertiary);">昨天</span>
            </div>
            <p class="text-[var(--font-size-sm)] truncate" style="color: var(--color-text-secondary);">收到，谢谢！</p>
          </div>
        </div>

        <!-- Session 5: Group chat, no unread -->
        <div class="flex items-center gap-[var(--space-md)] px-[var(--space-lg)] py-[var(--space-md)] relative" style="background-color: var(--color-bg); border-bottom: 1px solid var(--color-divider);">
          <!-- Avatar -->
          <div class="shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-sm font-semibold" style="background-color: #F5D4D4; color: #B54B4B;">
            项目
          </div>
          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[var(--font-size-base)] font-medium truncate" style="color: var(--color-text-primary);">项目讨论组 (8人)</span>
              <span class="text-[var(--font-size-xs)] shrink-0 ml-[var(--space-sm)]" style="color: var(--color-text-tertiary);">周一</span>
            </div>
            <p class="text-[var(--font-size-sm)] truncate" style="color: var(--color-text-secondary);">陈经理: 本周进度汇报已上传</p>
          </div>
        </div>

      </div>

      <!-- Bottom Tab Bar -->
      <nav class="fixed bottom-0 left-0 right-0 z-[var(--z-sticky)] flex items-center justify-around h-[50px]" style="background-color: var(--color-bg); border-top: 1px solid var(--color-border-light);">
        <!-- Tab: 消息 (active) -->
        <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full relative" style="color: var(--color-accent);" aria-label="消息" aria-current="page">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="text-[10px] font-medium">消息</span>
          <!-- Active dot indicator -->
          <span class="absolute bottom-1 w-1 h-1 rounded-full" style="background-color: var(--color-accent);"></span>
        </button>
        <!-- Tab: 设备 -->
        <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full" style="color: var(--color-text-tertiary);" aria-label="设备">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
            <line x1="12" y1="18" x2="12.01" y2="18"/>
          </svg>
          <span class="text-[10px] font-medium">设备</span>
        </button>
        <!-- Tab: 设置 -->
        <button class="flex flex-col items-center justify-center gap-0.5 flex-1 h-full" style="color: var(--color-text-tertiary);" aria-label="设置">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span class="text-[10px] font-medium">设置</span>
        </button>
      </nav>

    </main>

    <!-- Custom styles (body-placed per hard rules) -->
    <style>
      @keyframes badge-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.85; }
      }

      @media (prefers-reduced-motion: reduce) {
        @keyframes badge-pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
        }
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
