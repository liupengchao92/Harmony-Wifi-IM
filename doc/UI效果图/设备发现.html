<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备发现</title>
    <style id="theme-vars">
/* ========================================
   IM System — Brand Design Tokens
   Style: Minimalist White (极简白)
   Device: Mobile (HarmonyOS App Mockup)
   ======================================== */

:root {
  /* ---- Brand Colors ---- */
  --color-primary: #1A1A2E;
  --color-primary-light: #2D2D44;
  --color-primary-dark: #0F0F1A;

  --color-accent: #E8753A;
  --color-accent-light: #F09060;
  --color-accent-dark: #C45E28;

  /* ---- Neutral Scale ---- */
  --color-bg: #FFFFFF;
  --color-bg-secondary: #F5F5F7;
  --color-bg-tertiary: #EDEDF0;
  --color-surface: #FFFFFF;
  --color-surface-hover: #F9F9FB;

  --color-text-primary: #1A1A2E;
  --color-text-secondary: #6B6B80;
  --color-text-tertiary: #9E9EB0;
  --color-text-inverse: #FFFFFF;

  --color-border: #E5E5EA;
  --color-border-light: #F0F0F2;
  --color-divider: #EAEAEF;

  /* ---- State Colors ---- */
  --state-success: #34C759;
  --state-warning: #FF9F0A;
  --state-error: #FF3B30;
  --state-info: #007AFF;

  /* ---- Chat Specific ---- */
  --color-bubble-self: #E8753A;
  --color-bubble-self-text: #FFFFFF;
  --color-bubble-other: #F0F0F2;
  --color-bubble-other-text: #1A1A2E;
  --color-bubble-system: #F5F5F7;
  --color-bubble-system-text: #6B6B80;

  /* ---- Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: "PingFang SC", "HarmonyOS Sans", -apple-system, "Helvetica Neue", "Noto Sans SC", sans-serif;
  --font-family-mono: "SF Mono", "Menlo", "Monaco", monospace;

  --font-size-xs: 10px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 28px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.65;

  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.05em;

  /* ---- Spacing ---- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;
  --space-4xl: 48px;

  /* ---- Shadows ---- */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ---- Transitions ---- */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* ---- Z-index ---- */
  --z-base: 0;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;
}

/* ---- Typography Classes ---- */
.text-xs { font-size: var(--font-size-xs); line-height: var(--line-height-tight); }
.text-sm { font-size: var(--font-size-sm); line-height: var(--line-height-normal); }
.text-base { font-size: var(--font-size-base); line-height: var(--line-height-normal); }
.text-md { font-size: var(--font-size-md); line-height: var(--line-height-normal); }
.text-lg { font-size: var(--font-size-lg); line-height: var(--line-height-tight); }
.text-xl { font-size: var(--font-size-xl); line-height: var(--line-height-tight); }
.text-2xl { font-size: var(--font-size-2xl); line-height: var(--line-height-tight); }
.text-3xl { font-size: var(--font-size-3xl); line-height: var(--line-height-tight); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-semibold { font-weight: var(--font-weight-semibold); }
.font-bold { font-weight: var(--font-weight-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-tertiary { color: var(--color-text-tertiary); }
.text-accent { color: var(--color-accent); }
.text-inverse { color: var(--color-text-inverse); }

/* ---- Utility Classes ---- */
.bg-page { background-color: var(--color-bg); }
.bg-secondary { background-color: var(--color-bg-secondary); }
.bg-surface { background-color: var(--color-surface); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background-color: var(--color-bg-secondary);">

      <!-- Header Bar -->
      <header class="sticky top-0 z-[var(--z-sticky)] flex items-center justify-between px-4 h-11" style="background-color: var(--color-surface); border-bottom: 1px solid var(--color-border-light);">
        <div class="w-8"></div>
        <h1 class="text-base font-semibold truncate" style="color: var(--color-text-primary); letter-spacing: var(--letter-spacing-tight);">设备发现</h1>
        <button class="inline-flex items-center justify-center w-8 h-8 rounded-lg" style="color: var(--color-text-secondary);" aria-label="设置">
          <i data-lucide="settings" class="w-[18px] h-[18px]"></i>
        </button>
      </header>

      <!-- Content Area -->
      <div class="px-4 pt-4 pb-6">

        <!-- This Device Card -->
        <section class="rounded-lg p-4 mb-4" style="background-color: var(--color-surface); border: 1px solid var(--color-border-light);">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style="background-color: var(--color-accent);">
              <span class="text-sm font-semibold" style="color: var(--color-text-inverse);">H</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">我的 HarmonyOS 设备</p>
              <p class="text-xs truncate" style="color: var(--color-text-tertiary);">ID: HW-2024-X9F3A</p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="inline-flex items-center justify-center w-2 h-2 rounded-full" style="background-color: var(--state-success);"></span>
            <span class="text-xs" style="color: var(--state-success);">Wi-Fi Direct 已连接</span>
          </div>
        </section>

        <!-- Nearby Devices Section -->
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold" style="color: var(--color-text-primary);">附近设备</h2>
          <button class="inline-flex items-center gap-1 text-xs" style="color: var(--color-accent);" aria-label="刷新设备列表">
            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
            <span>刷新</span>
          </button>
        </div>

        <!-- Device List -->
        <div class="rounded-lg overflow-hidden" style="background-color: var(--color-surface); border: 1px solid var(--color-border-light);">

          <!-- Device Item 1: 张三的手机 -->
          <div class="device-item flex items-center gap-3 px-4 py-3 relative" style="border-bottom: 1px solid var(--color-border-light); transition: background-color var(--transition-fast);">
            <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-r-sm opacity-0" style="background-color: var(--color-accent); transition: opacity var(--transition-fast);"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style="background-color: #4A90D9;">
              <span class="text-sm font-semibold" style="color: #FFFFFF;">张</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">张三的手机</p>
              <div class="flex items-center gap-2 mt-0.5">
                <!-- Signal bars: 3 full bars (strong signal) -->
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="2" y="18" width="4" height="4" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="8" y="14" width="4" height="8" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="14" y="10" width="4" height="12" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="20" y="6" width="4" height="16" rx="0.5" fill="var(--color-border)"/>
                </svg>
                <span class="text-xs" style="color: var(--state-success);">在线</span>
              </div>
            </div>
            <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap shrink-0" style="background-color: var(--color-accent); color: var(--color-text-inverse); transition: opacity var(--transition-fast);" data-dom-id="device-item-chat">
              连接
            </button>
          </div>

          <!-- Device Item 2: 李四的平板 -->
          <div class="device-item flex items-center gap-3 px-4 py-3 relative" style="border-bottom: 1px solid var(--color-border-light); transition: background-color var(--transition-fast);">
            <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-r-sm opacity-0" style="background-color: var(--color-accent); transition: opacity var(--transition-fast);"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style="background-color: #7B68EE;">
              <span class="text-sm font-semibold" style="color: #FFFFFF;">李</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">李四的平板</p>
              <div class="flex items-center gap-2 mt-0.5">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="2" y="18" width="4" height="4" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="8" y="14" width="4" height="8" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="14" y="10" width="4" height="12" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="20" y="6" width="4" height="16" rx="0.5" fill="var(--color-border)"/>
                </svg>
                <span class="text-xs" style="color: var(--state-success);">在线</span>
              </div>
            </div>
            <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap shrink-0" style="background-color: var(--color-accent); color: var(--color-text-inverse); transition: opacity var(--transition-fast);">
              连接
            </button>
          </div>

          <!-- Device Item 3: 王五的笔记本 -->
          <div class="device-item flex items-center gap-3 px-4 py-3 relative" style="border-bottom: 1px solid var(--color-border-light); transition: background-color var(--transition-fast);">
            <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-r-sm opacity-0" style="background-color: var(--color-accent); transition: opacity var(--transition-fast);"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style="background-color: #E8A838;">
              <span class="text-sm font-semibold" style="color: #FFFFFF;">王</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">王五的笔记本</p>
              <div class="flex items-center gap-2 mt-0.5">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="2" y="18" width="4" height="4" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="8" y="14" width="4" height="8" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="14" y="10" width="4" height="12" rx="0.5" fill="var(--color-border)"/>
                  <rect x="20" y="6" width="4" height="16" rx="0.5" fill="var(--color-border)"/>
                </svg>
                <span class="text-xs" style="color: var(--color-text-tertiary);">可连接</span>
              </div>
            </div>
            <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap shrink-0" style="border: 1px solid var(--color-accent); color: var(--color-accent); background-color: transparent; transition: background-color var(--transition-fast);">
              连接
            </button>
          </div>

          <!-- Device Item 4: 赵六的手机 -->
          <div class="device-item flex items-center gap-3 px-4 py-3 relative" style="transition: background-color var(--transition-fast);">
            <div class="absolute left-0 top-0 bottom-0 w-[3px] rounded-r-sm opacity-0" style="background-color: var(--color-accent); transition: opacity var(--transition-fast);"></div>
            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style="background-color: #50C878;">
              <span class="text-sm font-semibold" style="color: #FFFFFF;">赵</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">赵六的手机</p>
              <div class="flex items-center gap-2 mt-0.5">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="2" y="18" width="4" height="4" rx="0.5" fill="var(--color-accent)"/>
                  <rect x="8" y="14" width="4" height="8" rx="0.5" fill="var(--color-border)"/>
                  <rect x="14" y="10" width="4" height="12" rx="0.5" fill="var(--color-border)"/>
                  <rect x="20" y="6" width="4" height="16" rx="0.5" fill="var(--color-border)"/>
                </svg>
                <span class="text-xs" style="color: var(--color-text-tertiary);">可连接</span>
              </div>
            </div>
            <button class="inline-flex items-center justify-center px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap shrink-0" style="border: 1px solid var(--color-accent); color: var(--color-accent); background-color: transparent; transition: background-color var(--transition-fast);">
              连接
            </button>
          </div>

        </div>

        <!-- Bottom Area -->
        <div class="mt-6">
          <button class="w-full flex items-center justify-center py-3 rounded-lg text-sm font-medium whitespace-nowrap" style="background-color: var(--color-accent); color: var(--color-text-inverse); transition: opacity var(--transition-fast);">
            <i data-lucide="users" class="w-4 h-4 mr-2"></i>
            创建群组
          </button>
          <p class="text-center text-xs mt-3" style="color: var(--color-text-tertiary);">已发现 4 台设备，2 台在线</p>
        </div>

      </div>

    </main>

    <!-- Custom styles for device item interactions -->
    <style>
      @media (prefers-reduced-motion: reduce) {
        .device-item, .device-item > div, .device-item button {
          transition: none !important;
        }
      }
      .device-item:hover > div:first-of-type {
        opacity: 1;
      }
      .device-item:hover {
        background-color: var(--color-surface-hover);
      }
      .device-item button:hover {
        opacity: 0.85;
      }
      .device-item button:active {
        opacity: 0.7;
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
