<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片预览</title>
    <style id="theme-vars">
/* ========================================
   IM System — Brand Design Tokens
   Style: Minimalist White (极简白)
   Device: Mobile (HarmonyOS App Mockup)
   ======================================== */

:root {
  /* ---- Brand Colors ---- */
  --color-primary: #1A1A2E;
  --color-primary-light: #2D2D44;
  --color-primary-dark: #0F0F1A;

  --color-accent: #E8753A;
  --color-accent-light: #F09060;
  --color-accent-dark: #C45E28;

  /* ---- Neutral Scale ---- */
  --color-bg: #FFFFFF;
  --color-bg-secondary: #F5F5F7;
  --color-bg-tertiary: #EDEDF0;
  --color-surface: #FFFFFF;
  --color-surface-hover: #F9F9FB;

  --color-text-primary: #1A1A2E;
  --color-text-secondary: #6B6B80;
  --color-text-tertiary: #9E9EB0;
  --color-text-inverse: #FFFFFF;

  --color-border: #E5E5EA;
  --color-border-light: #F0F0F2;
  --color-divider: #EAEAEF;

  /* ---- State Colors ---- */
  --state-success: #34C759;
  --state-warning: #FF9F0A;
  --state-error: #FF3B30;
  --state-info: #007AFF;

  /* ---- Chat Specific ---- */
  --color-bubble-self: #E8753A;
  --color-bubble-self-text: #FFFFFF;
  --color-bubble-other: #F0F0F2;
  --color-bubble-other-text: #1A1A2E;
  --color-bubble-system: #F5F5F7;
  --color-bubble-system-text: #6B6B80;

  /* ---- Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: "PingFang SC", "HarmonyOS Sans", -apple-system, "Helvetica Neue", "Noto Sans SC", sans-serif;
  --font-family-mono: "SF Mono", "Menlo", "Monaco", monospace;

  --font-size-xs: 10px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 28px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.65;

  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.05em;

  /* ---- Spacing ---- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;
  --space-4xl: 48px;

  /* ---- Shadows ---- */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ---- Transitions ---- */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* ---- Z-index ---- */
  --z-base: 0;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;
}

/* ---- Typography Classes ---- */
.text-xs { font-size: var(--font-size-xs); line-height: var(--line-height-tight); }
.text-sm { font-size: var(--font-size-sm); line-height: var(--line-height-normal); }
.text-base { font-size: var(--font-size-base); line-height: var(--line-height-normal); }
.text-md { font-size: var(--font-size-md); line-height: var(--line-height-normal); }
.text-lg { font-size: var(--font-size-lg); line-height: var(--line-height-tight); }
.text-xl { font-size: var(--font-size-xl); line-height: var(--line-height-tight); }
.text-2xl { font-size: var(--font-size-2xl); line-height: var(--line-height-tight); }
.text-3xl { font-size: var(--font-size-3xl); line-height: var(--line-height-tight); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-semibold { font-weight: var(--font-weight-semibold); }
.font-bold { font-weight: var(--font-weight-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-tertiary { color: var(--color-text-tertiary); }
.text-accent { color: var(--color-accent); }
.text-inverse { color: var(--color-text-inverse); }

/* ---- Utility Classes ---- */
.bg-page { background-color: var(--color-bg); }
.bg-secondary { background-color: var(--color-bg-secondary); }
.bg-surface { background-color: var(--color-surface); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="margin:0; padding:0; background:#0F0F1A; overflow:hidden;">
    <main class="relative w-full h-screen" style="background:#0F0F1A;">

      <!-- Dark backdrop (clickable to close) -->
      <div class="absolute inset-0 z-0" data-dom-id="preview-backdrop" style="background:#0F0F1A;"></div>

      <!-- Image container centered -->
      <div class="absolute inset-0 z-10 flex items-center justify-center" style="padding: 56px 16px 80px;">
        <div class="w-full h-full relative overflow-hidden" style="border-radius: var(--radius-md); max-width: 100%; max-height: 100%;">
          <!-- CSS gradient simulating a sunset landscape photo -->
          <div class="w-full h-full" style="
            background:
              /* Sun glow */
              radial-gradient(ellipse 80px 60px at 50% 52%, rgba(255,200,80,0.6) 0%, transparent 70%),
              /* Sky: warm orange/pink fading to deep blue */
              linear-gradient(
                to bottom,
                #0B1026 0%,
                #1B2A5C 18%,
                #3A4F8A 30%,
                #6B5B8A 40%,
                #C0606A 48%,
                #E8753A 55%,
                #F09060 60%,
                #F5B070 65%,
                /* Horizon warm band */
                #E8A050 68%,
                /* Dark silhouette landscape */
                #1A1A2E 70%,
                #0F0F1A 75%,
                #0A0A14 100%
              );
            border-radius: var(--radius-md);
          ">
            <!-- Silhouette mountain/tree shapes at bottom -->
            <div class="absolute bottom-0 left-0 right-0" style="height: 32%;">
              <svg viewBox="0 0 400 100" preserveAspectRatio="none" class="w-full h-full" style="display:block;">
                <path d="M0,100 L0,65 L30,55 L55,60 L80,40 L110,58 L140,35 L170,50 L200,28 L230,45 L260,32 L290,48 L320,38 L350,52 L380,42 L400,55 L400,100 Z" fill="#0A0A14"/>
                <path d="M0,100 L0,72 L25,68 L50,75 L70,65 L95,72 L120,62 L145,70 L170,60 L195,68 L220,58 L245,66 L270,60 L295,68 L320,62 L345,70 L370,64 L400,72 L400,100 Z" fill="#0F0F1A"/>
                <!-- Tree silhouettes -->
                <rect x="60" y="55" width="3" height="15" fill="#0A0A14"/>
                <polygon points="61.5,42 55,55 68,55" fill="#0A0A14"/>
                <rect x="150" y="48" width="3" height="18" fill="#0A0A14"/>
                <polygon points="151.5,34 144,48 159,48" fill="#0A0A14"/>
                <rect x="280" y="50" width="3" height="16" fill="#0A0A14"/>
                <polygon points="281.5,38 275,50 288,50" fill="#0A0A14"/>
                <rect x="340" y="52" width="2.5" height="14" fill="#0A0A14"/>
                <polygon points="341.25,42 336,52 346.5,52" fill="#0A0A14"/>
              </svg>
            </div>
            <!-- Subtle stars in the dark sky area -->
            <div class="absolute top-0 left-0 right-0" style="height: 30%; opacity: 0.4;">
              <svg viewBox="0 0 200 60" preserveAspectRatio="xMidYMid slice" class="w-full h-full">
                <circle cx="20" cy="10" r="0.8" fill="#FFFFFF"/>
                <circle cx="55" cy="25" r="0.5" fill="#FFFFFF"/>
                <circle cx="90" cy="8" r="0.7" fill="#FFFFFF"/>
                <circle cx="130" cy="20" r="0.6" fill="#FFFFFF"/>
                <circle cx="165" cy="12" r="0.9" fill="#FFFFFF"/>
                <circle cx="45" cy="40" r="0.4" fill="#FFFFFF"/>
                <circle cx="110" cy="35" r="0.5" fill="#FFFFFF"/>
                <circle cx="180" cy="30" r="0.6" fill="#FFFFFF"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Top overlay bar -->
      <header class="absolute top-0 left-0 right-0 z-30 flex items-center justify-between" style="padding: env(safe-area-inset-top, 0px) 16px 12px; background: linear-gradient(to bottom, rgba(15,15,26,0.85) 0%, rgba(15,15,26,0.4) 70%, transparent 100%);">
        <!-- Close button -->
        <button class="flex items-center justify-center shrink-0" style="width: 36px; height: 36px; border-radius: var(--radius-full); background: rgba(255,255,255,0.12); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: background var(--transition-fast);" data-dom-id="close-preview" aria-label="关闭预览">
          <i data-lucide="x" style="width: 18px; height: 18px; color: #FFFFFF;"></i>
        </button>
        <!-- Center title -->
        <span class="font-medium text-sm" style="color: #FFFFFF; letter-spacing: var(--letter-spacing-tight);">图片预览</span>
        <!-- Download/save button -->
        <button class="flex items-center justify-center shrink-0" style="width: 36px; height: 36px; border-radius: var(--radius-full); background: rgba(255,255,255,0.12); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: background var(--transition-fast);" aria-label="保存图片">
          <i data-lucide="download" style="width: 18px; height: 18px; color: #FFFFFF;"></i>
        </button>
      </header>

      <!-- Bottom overlay bar -->
      <footer class="absolute bottom-0 left-0 right-0 z-30 flex items-center justify-center" style="padding: 12px 16px env(safe-area-inset-bottom, 0px); background: linear-gradient(to top, rgba(15,15,26,0.85) 0%, rgba(15,15,26,0.4) 70%, transparent 100%);">
        <div class="flex items-center gap-3">
          <span class="text-sm font-normal" style="color: rgba(255,255,255,0.9);">photo_20260624.jpg</span>
          <span class="text-xs font-normal" style="color: rgba(255,255,255,0.5);">2.0 MB</span>
        </div>
      </footer>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
