<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群聊会话</title>
    <style id="theme-vars">
/* ========================================
   IM System — Brand Design Tokens
   Style: Minimalist White (极简白)
   Device: Mobile (HarmonyOS App Mockup)
   ======================================== */

:root {
  /* ---- Brand Colors ---- */
  --color-primary: #1A1A2E;
  --color-primary-light: #2D2D44;
  --color-primary-dark: #0F0F1A;

  --color-accent: #E8753A;
  --color-accent-light: #F09060;
  --color-accent-dark: #C45E28;

  /* ---- Neutral Scale ---- */
  --color-bg: #FFFFFF;
  --color-bg-secondary: #F5F5F7;
  --color-bg-tertiary: #EDEDF0;
  --color-surface: #FFFFFF;
  --color-surface-hover: #F9F9FB;

  --color-text-primary: #1A1A2E;
  --color-text-secondary: #6B6B80;
  --color-text-tertiary: #9E9EB0;
  --color-text-inverse: #FFFFFF;

  --color-border: #E5E5EA;
  --color-border-light: #F0F0F2;
  --color-divider: #EAEAEF;

  /* ---- State Colors ---- */
  --state-success: #34C759;
  --state-warning: #FF9F0A;
  --state-error: #FF3B30;
  --state-info: #007AFF;

  /* ---- Chat Specific ---- */
  --color-bubble-self: #E8753A;
  --color-bubble-self-text: #FFFFFF;
  --color-bubble-other: #F0F0F2;
  --color-bubble-other-text: #1A1A2E;
  --color-bubble-system: #F5F5F7;
  --color-bubble-system-text: #6B6B80;

  /* ---- Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Typography ---- */
  --font-family: "PingFang SC", "HarmonyOS Sans", -apple-system, "Helvetica Neue", "Noto Sans SC", sans-serif;
  --font-family-mono: "SF Mono", "Menlo", "Monaco", monospace;

  --font-size-xs: 10px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 17px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 28px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.65;

  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.05em;

  /* ---- Spacing ---- */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;
  --space-4xl: 48px;

  /* ---- Shadows ---- */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.12);

  /* ---- Transitions ---- */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 350ms ease;

  /* ---- Z-index ---- */
  --z-base: 0;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 300;
  --z-modal: 400;
  --z-toast: 500;
}

/* ---- Typography Classes ---- */
.text-xs { font-size: var(--font-size-xs); line-height: var(--line-height-tight); }
.text-sm { font-size: var(--font-size-sm); line-height: var(--line-height-normal); }
.text-base { font-size: var(--font-size-base); line-height: var(--line-height-normal); }
.text-md { font-size: var(--font-size-md); line-height: var(--line-height-normal); }
.text-lg { font-size: var(--font-size-lg); line-height: var(--line-height-tight); }
.text-xl { font-size: var(--font-size-xl); line-height: var(--line-height-tight); }
.text-2xl { font-size: var(--font-size-2xl); line-height: var(--line-height-tight); }
.text-3xl { font-size: var(--font-size-3xl); line-height: var(--line-height-tight); }

.font-normal { font-weight: var(--font-weight-normal); }
.font-medium { font-weight: var(--font-weight-medium); }
.font-semibold { font-weight: var(--font-weight-semibold); }
.font-bold { font-weight: var(--font-weight-bold); }

.text-primary { color: var(--color-text-primary); }
.text-secondary { color: var(--color-text-secondary); }
.text-tertiary { color: var(--color-text-tertiary); }
.text-accent { color: var(--color-accent); }
.text-inverse { color: var(--color-text-inverse); }

/* ---- Utility Classes ---- */
.bg-page { background-color: var(--color-bg); }
.bg-secondary { background-color: var(--color-bg-secondary); }
.bg-surface { background-color: var(--color-surface); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="font-family: var(--font-family); max-width: 375px; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; overflow: hidden;">

    <!-- Status Bar Spacer -->
    <div class="h-11 bg-[var(--color-surface)] shrink-0"></div>

    <!-- Header Bar -->
    <header class="flex items-center justify-between px-4 h-11 bg-[var(--color-surface)] border-b border-[var(--color-border-light)] shrink-0" style="z-index: var(--z-sticky);">
        <button data-dom-id="back-to-sessions" class="inline-flex items-center justify-center w-8 h-8 rounded-lg hover:bg-[var(--color-surface-hover)] transition-colors duration-150" aria-label="返回">
            <i data-lucide="chevron-left" class="w-5 h-5" style="color: var(--color-primary);"></i>
        </button>
        <div class="flex items-center gap-1 min-w-0">
            <span class="text-[17px] font-semibold truncate" style="color: var(--color-primary); letter-spacing: var(--letter-spacing-tight); line-height: var(--line-height-tight);">P2P群组</span>
            <span class="text-[12px] shrink-0" style="color: var(--color-text-tertiary);">(3)</span>
        </div>
        <button class="inline-flex items-center justify-center w-8 h-8 rounded-lg hover:bg-[var(--color-surface-hover)] transition-colors duration-150" aria-label="成员列表">
            <i data-lucide="users" class="w-5 h-5" style="color: var(--color-primary);"></i>
        </button>
    </header>

    <!-- Chat Message Area -->
    <main class="flex-1 overflow-y-auto no-scrollbar px-4 py-3" style="background-color: var(--color-bg-secondary);">

        <!-- System Message: Member Joined -->
        <div class="flex justify-center my-3">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full" style="background-color: var(--color-bubble-system);">
                <span class="text-[12px]" style="color: var(--color-bubble-system-text);">— 张三的手机 加入了群组 —</span>
            </div>
        </div>

        <!-- Time Separator -->
        <div class="flex justify-center my-2">
            <span class="text-[11px] px-2 py-0.5 rounded" style="color: var(--color-text-tertiary);">今天 15:00</span>
        </div>

        <!-- Message from 张三的手机 (left-aligned) -->
        <div class="flex items-start gap-2 mb-3">
            <div class="w-8 h-8 rounded-full shrink-0 flex items-center justify-center text-[12px] font-medium" style="background-color: var(--color-accent); color: var(--color-text-inverse);">张</div>
            <div class="flex flex-col min-w-0" style="max-width: calc(100% - 40px);">
                <span class="text-[11px] mb-1" style="color: var(--color-accent);">张三的手机</span>
                <div class="px-3 py-2 rounded-lg self-start" style="background-color: var(--color-bubble-other); border-radius: 2px 12px 12px 12px;">
                    <span class="text-[14px]" style="color: var(--color-bubble-other-text); line-height: var(--line-height-normal);">大家好！群组已经建立好了</span>
                </div>
            </div>
        </div>

        <!-- Message from 李四的平板 (left-aligned) -->
        <div class="flex items-start gap-2 mb-3">
            <div class="w-8 h-8 rounded-full shrink-0 flex items-center justify-center text-[12px] font-medium" style="background-color: var(--color-primary); color: var(--color-text-inverse);">李</div>
            <div class="flex flex-col min-w-0" style="max-width: calc(100% - 40px);">
                <span class="text-[11px] mb-1" style="color: var(--color-accent);">李四的平板</span>
                <div class="px-3 py-2 rounded-lg self-start" style="background-color: var(--color-bubble-other); border-radius: 2px 12px 12px 12px;">
                    <span class="text-[14px]" style="color: var(--color-bubble-other-text); line-height: var(--line-height-normal);">收到，我这边信号很好</span>
                </div>
            </div>
        </div>

        <!-- Sent message from self (right-aligned) -->
        <div class="flex items-start justify-end mb-3">
            <div class="px-3 py-2 rounded-lg" style="background-color: var(--color-bubble-self); border-radius: 12px 2px 12px 12px; max-width: 75%;">
                <span class="text-[14px]" style="color: var(--color-bubble-self-text); line-height: var(--line-height-normal);">太好了，我们可以开始聊天了</span>
            </div>
        </div>

        <!-- System Message: Member Joined -->
        <div class="flex justify-center my-3">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full" style="background-color: var(--color-bubble-system);">
                <span class="text-[12px]" style="color: var(--color-bubble-system-text);">— 王五的设备 加入了群组 —</span>
            </div>
        </div>

        <!-- Message from 王五的设备 (left-aligned, with image) -->
        <div class="flex items-start gap-2 mb-3">
            <div class="w-8 h-8 rounded-full shrink-0 flex items-center justify-center text-[12px] font-medium" style="background-color: var(--color-text-secondary); color: var(--color-text-inverse);">王</div>
            <div class="flex flex-col min-w-0" style="max-width: calc(100% - 40px);">
                <span class="text-[11px] mb-1" style="color: var(--color-accent);">王五的设备</span>
                <div class="px-2 py-2 rounded-lg self-start" style="background-color: var(--color-bubble-other); border-radius: 2px 12px 12px 12px;">
                    <div data-dom-id="group-chat-image-thumb" class="w-[120px] h-[120px] rounded-md overflow-hidden mb-1 cursor-pointer hover:opacity-80 transition-opacity duration-150" style="background-color: var(--color-bg-tertiary);">
                        <!-- CSS placeholder for image thumbnail -->
                        <div class="w-full h-full flex items-center justify-center" style="background: linear-gradient(135deg, var(--color-bg-tertiary) 0%, var(--color-border-light) 100%);">
                            <i data-lucide="image" class="w-8 h-8" style="color: var(--color-text-tertiary);"></i>
                        </div>
                    </div>
                    <span class="text-[14px]" style="color: var(--color-bubble-other-text); line-height: var(--line-height-normal);">分享一张照片</span>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Input Bar -->
    <footer class="flex items-center gap-2 px-3 py-2 bg-[var(--color-surface)] border-t border-[var(--color-border-light)] shrink-0">
        <button class="inline-flex items-center justify-center w-8 h-8 rounded-lg hover:bg-[var(--color-surface-hover)] transition-colors duration-150 shrink-0" aria-label="更多">
            <i data-lucide="plus" class="w-5 h-5" style="color: var(--color-text-secondary);"></i>
        </button>
        <div class="flex-1 min-w-0">
            <input type="text" placeholder="输入消息..." class="w-full h-9 px-3 rounded-full text-[14px] outline-none" style="background-color: var(--color-bg-secondary); color: var(--color-text-primary); border: 1px solid var(--color-border-light); font-family: var(--font-family);" />
        </div>
        <button class="inline-flex items-center justify-center h-9 px-4 rounded-full text-[14px] font-medium shrink-0 transition-colors duration-150" style="background-color: var(--color-accent); color: var(--color-text-inverse);">
            发送
        </button>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
